services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: currency-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - currency-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: currency-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - currency-net

networks:
  currency-net:
    driver: bridge